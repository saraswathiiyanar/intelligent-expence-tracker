<!DOCTYPE html>
<html>
<head>
    <title>Financial Advice</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            width:500px;
            box-shadow:0 0 20px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#4a148c;
        }

        p{
            font-size:18px;
            padding:10px;
            background:#f3e5f5;
            border-radius:8px;
        }

        a{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            background:#4a148c;
            color:white;
            padding:12px;
            border-radius:8px;
        }

        a:hover{
            background:#6a1b9a;
        }
    </style>
</head>

<body>

<div class="card">

    <h2>💡 Financial Advice</h2>

    <p>💰 Save at least 20% of your monthly income.</p>

    <p>🛒 Avoid unnecessary expenses.</p>

    <p>📊 Track your expenses regularly.</p>

    <a href="/dashboard">⬅ Back to Dashboard</a>

</div>

</body>
</html>
